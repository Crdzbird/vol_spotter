name: vol_spotter_macos
description: >-
  macOS stub implementation of the vol_spotter plugin. Physical button
  detection is not supported on macOS.
version: 0.1.0+2
repository: https://github.com/Crdzbird/vol_spotter

environment:
  sdk: ^3.11.0
  flutter: '>=3.27.0'

flutter:
  plugin:
    implements: vol_spotter
    platforms:
      macos:
        pluginClass: VolSpotterPlugin
        dartPluginClass: VolSpotterMacOS

dependencies:
  flutter:
    sdk: flutter
  vol_spotter_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
