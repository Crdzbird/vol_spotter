name: vol_spotter_macos
description: >-
  macOS implementation of the vol_spotter plugin for detecting physical
  button presses (volume keys, power/sleep) using CGEvent taps and
  NSWorkspace notifications.
version: 0.2.1
repository: https://github.com/Crdzbird/vol_spotter

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

flutter:
  plugin:
    implements: vol_spotter
    platforms:
      macos:
        pluginClass: VolSpotterPlugin
        dartPluginClass: VolSpotterMacOS

dependencies:
  flutter:
    sdk: flutter
  vol_spotter_platform_interface: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
