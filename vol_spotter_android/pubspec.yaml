name: vol_spotter_android
description: >-
  Android implementation of the vol_spotter plugin for detecting physical
  button presses (volume, power) using Window.Callback and BroadcastReceiver.
version: 0.1.0+2
repository: https://github.com/Crdzbird/vol_spotter

environment:
  sdk: ^3.11.0
  flutter: '>=3.27.0'

flutter:
  plugin:
    implements: vol_spotter
    platforms:
      android:
        package: com.example.verygoodcore
        pluginClass: VolSpotterPlugin
        dartPluginClass: VolSpotterAndroid

dependencies:
  flutter:
    sdk: flutter
  vol_spotter_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
