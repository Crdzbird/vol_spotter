name: vol_spotter_ios
description: >-
  iOS implementation of the vol_spotter plugin for detecting physical button
  presses (volume, power) using AVAudioSession KVO and MPVolumeView.
version: 0.1.0+2
repository: https://github.com/Crdzbird/vol_spotter

environment:
  sdk: ^3.11.0
  flutter: '>=3.27.0'

flutter:
  plugin:
    implements: vol_spotter
    platforms:
      ios:
        pluginClass: VolSpotterPlugin
        dartPluginClass: VolSpotterIOS

dependencies:
  flutter:
    sdk: flutter
  vol_spotter_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
